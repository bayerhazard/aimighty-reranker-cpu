---
olaresManifest.version: '0.10.0'
olaresManifest.type: app
apiVersion: 'v2'
metadata:
  name: aimrerqwen3vllm
  icon: https://raw.githubusercontent.com/bayerhazard/aimighty-reranker/main/icon.png
  description: Qwen3-Reranker-0.6B via vllm
  title: AIM Qwen3 Rer 0.6B vllm
  version: '1.2.5'
  categories:
    - AI
entrances:
  - name: aimrerqwen3vllm
    port: 8080
    host: aimrerqwen3vllm
    title: Reranker
    icon: https://raw.githubusercontent.com/bayerhazard/aimighty-reranker/main/icon.png
    openMethod: window
    authLevel: internal
spec:
  versionName: '1.2.5'
  upgradeDescription: |
    v1.2.5: Added proxy port 30001 to service, updated rerank proxy with aiohttp (Cohere/Jina→/classify), fixed YAML parsing in dashboard-configmap.
    v1.2.2: Removed --task score arg (not supported by vllm api_server.py entrypoint). Fixed YAML indentation in dashboard-configmap.yaml.
    v1.2.0: Stable production release. All features tested and verified.
    v1.1.9: Added rerank-proxy container (Python aiohttp) that translates Cohere/Jina /v1/rerank API to vLLM /classify API. Extracted ConfigMaps from inline deployment.yaml into separate template files (proxy-configmap.yaml, dashboard-configmap.yaml). Dashboard now routes through proxy port 30001 instead of directly to vLLM.
    v1.1.8: Switched to tomaarsen/Qwen3-Reranker-0.6B-seq-cls sequence classification model. Added --task score for native vLLM /v1/rerank endpoint (Cohere/Jina-compatible). Removed need for rerank proxy.
    v1.1.7: Switched vllm image from pinned v0.10.0 back to latest for best RTX 5090 Mobile (Blackwell/SM120) compatibility. vLLM official images now include upstream Blackwell support.
    v1.1.6: Bumped all versions to 1.1.6 for Olares consistency. Pinned vllm image to v0.10.0. Extracted dashboard ConfigMap from deployment.yaml for cleaner Helm chart.
    v1.1.5: Restructured Helm chart into aimrerqwen3vllm/ subdirectory. Set livenessProbe initialDelay to 1200s for reliable startup.
    v1.1.4: Fixed K8s resource naming. All deployments, services, and labels now use app name "aimrerqwen3vllm" instead of "reranker" for proper Olares integration.
    v1.1.3: Fixed OlaresManifest structure to match Olares spec v0.10.0. Moved resource fields to spec section. Fixed manifest version compatibility.
    v1.1.1: Fixed missing icon in installed apps. Added icon URL to entrances and switched to raw.githubusercontent.com CDN.
    v1.1.0: Switched inference engine from SGLang to vllm. Renamed app to aimrerqwen3vllm. Updated all metadata and chart to reflect vllm backend.
    v1.0.9: Fix PROXY_INBOUND iptables chain is now created before rules are inserted (fixes CrashLoopBackOff on restart).
    v1.0.8: Fix owner label value in Deployment metadata is now "aimighty" (was the app name).
    v1.0.7: Added owner+raw-app-name labels to Deployment metadata.
  fullDescription: |
    Aimighty Reranker deploys Qwen3-Reranker-0.6B using vllm on NVIDIA RTX 5090 (Blackwell).

    **Features**
    - /v1/rerank endpoint (OpenAI-compatible)
    - Live monitoring dashboard on port 8080
    - FlashInfer attention backend optimized for SM120
    - Prometheus metrics via /metrics
    - Optimized: 4 GB GPU, 12 GB RAM

    **Resource Usage**
    GPU: 4 GB VRAM (NVIDIA RTX 5090 or compatible)
    RAM: 12 GB
    Disk: 10 GB

  developer: Aimighty
  website: https://github.com/bayerhazard/aimighty-reranker
  sourceCode: https://github.com/bayerhazard/aimighty-reranker
  locale:
    - en-US
  supportArch:
    - amd64
  limitedCpu: 4
  requiredCpu: 1
  requiredMemory: 4Gi
  limitedMemory: 12Gi
  requiredDisk: 10Gi
  requiredGpu: 1Gi
  limitedGpu: 24Gi
permission:
  appData: true
options:
  apiTimeout: 3600
  dependencies:
    - name: olares
      version: '>=1.12.2-0'
      type: system
  allowMultipleInstall: false
