apiVersion: v1
kind: ConfigMap
metadata:
  name: aimrerqwen3vllm-proxy
  namespace: {{ .Release.Namespace }}
data:
  rerank_proxy.py: |
    import asyncio
    import json
    import uuid
    from aiohttp import web
    import aiohttp

    VLLM_URL = "http://localhost:30000"

    SYSTEM_PREFIX = "^system\nJudge whether the Document meets the requirements based on the Query and the Instruct provided. Note that the answer can only be \"yes\" or \"no\".\n\n^user\n"
    ASSISTANT_SUFFIX = "\n\n^assistant\n  \n\n\n\n"

    DEFAULT_INSTRUCTION = "Given a web search query, retrieve relevant passages that answer the query"

    def format_pair(query, document, instruction=None):
        if instruction is None:
            instruction = DEFAULT_INSTRUCTION
        return f"{SYSTEM_PREFIX}<Instruct>: {instruction}\n<Query>: {query}\n<Document>: {document}{ASSISTANT_SUFFIX}"

    async def handle_rerank(request):
        body = await request.json()
        query = body.get("query", "")
        documents = body.get("documents", [])
        instruction = body.get("instruction", None)
        top_n = body.get("top_n", len(documents))
        model = body.get("model", "Qwen/Qwen3-Reranker-0.6B")

        if not documents:
            return web.json_response(
                {"error": {"message": "documents field is required", "type": "Bad Request", "param": None, "code": 400}},
                status=400
            )

        if not query:
            return web.json_response(
                {"error": {"message": "query field is required", "type": "Bad Request", "param": None, "code": 400}},
                status=400
            )

        pairs = [format_pair(query, doc, instruction) for doc in documents]

        async with aiohttp.ClientSession() as session:
            resp = await session.post(
                f"{VLLM_URL}/classify",
                json={"model": model, "input": pairs},
                timeout=aiohttp.ClientTimeout(total=300)
            )
            vllm_data = await resp.json()

        scores = []
        for item in vllm_data.get("data", []):
            scores.append({
                "index": item["index"],
                "relevance_score": item["probs"][0]
            })

        sorted_scores = sorted(scores, key=lambda x: x["relevance_score"], reverse=True)
        sorted_scores = sorted_scores[:top_n]

        results = []
        for s in sorted_scores:
            results.append({
                "index": s["index"],
                "document": {"text": documents[s["index"]], "multi_modal": None},
                "relevance_score": s["relevance_score"]
            })

        prompt_tokens = vllm_data.get("usage", {}).get("prompt_tokens", 0)
        total_tokens = vllm_data.get("usage", {}).get("total_tokens", 0)

        response = {
            "id": f"rerank-{uuid.uuid4().hex[:12]}",
            "model": model,
            "results": results,
            "usage": {
                "prompt_tokens": prompt_tokens,
                "total_tokens": total_tokens
            }
        }

        return web.json_response(response)

    async def handle_v1_rerank(request):
        return await handle_rerank(request)

    async def handle_health(request):
        try:
            async with aiohttp.ClientSession() as session:
                resp = await session.get(f"{VLLM_URL}/health", timeout=aiohttp.ClientTimeout(total=10))
                if resp.status == 200:
                    return web.json_response({"status": "healthy"})
        except Exception:
            pass
        return web.json_response({"status": "unhealthy"}, status=503)

    async def handle_models(request):
        try:
            async with aiohttp.ClientSession() as session:
                resp = await session.get(f"{VLLM_URL}/v1/models", timeout=aiohttp.ClientTimeout(total=10))
                return web.response(body=await resp.read(), content_type="application/json", status=resp.status)
        except Exception:
            return web.json_response({"error": "vLLM unreachable"}, status=503)

    app = web.Application()
    app.router.add_post("/rerank", handle_rerank)
    app.router.add_post("/v1/rerank", handle_v1_rerank)
    app.router.add_post("/v2/rerank", handle_v1_rerank)
    app.router.add_get("/health", handle_health)
    app.router.add_get("/v1/models", handle_models)
    app.router.add_get("/get_model_info", handle_models)

    if __name__ == "__main__":
        web.run_app(app, host="0.0.0.0", port=30001)
