apiVersion: apps/v1
kind: Deployment
metadata:
  name: aimrerqwen3vllm
  namespace: {{ .Release.Namespace }}
  labels:
    app: aimrerqwen3vllm
    applications.app.bytetrade.io/name: aimrerqwen3vllm
    applications.app.bytetrade.io/owner: aimighty
    applications.app.bytetrade.io/raw-app-name: aimrerqwen3vllm
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      app: aimrerqwen3vllm
  strategy:
    type: {{ .Values.strategy.type }}
  template:
    metadata:
      labels:
        app: aimrerqwen3vllm
        applications.app.bytetrade.io/name: aimrerqwen3vllm
        applications.app.bytetrade.io/owner: {{ .Release.Namespace | trimSuffix "-aimighty" }}
        applications.app.bytetrade.io/raw-app-name: aimrerqwen3vllm
        io.bytetrade.app: "true"
    spec:
      initContainers:
      - name: fix-kubelet-bypass
        image: beclab/init:v1.2.3
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - |
          iptables -t nat -N PROXY_INBOUND 2>/dev/null || true
          for cidr in {{ join " " .Values.kubeletCidrs }}; do
            iptables -t nat -I PROXY_INBOUND 1 -s "$cidr" -j RETURN
          done
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - NET_RAW
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      containers:
      # vllm Inference Engine
      - name: aimrerqwen3vllm
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
        args:
        - --model
        - {{ .Values.vllmArgs.model }}
        - --host
        - 0.0.0.0
        - --port
        - {{ .Values.apiPort | quote }}
        - --dtype
        - {{ .Values.vllmArgs.dtype }}
        - --gpu-memory-utilization
        - {{ .Values.vllmArgs.gpuMemoryUtilization | quote }}
        - --max-model-len
        - {{ .Values.vllmArgs.maxModelLen | quote }}
        - --max-num-seqs
        - {{ .Values.vllmArgs.maxNumSeqs | quote }}
        - --served-model-name
        - {{ .Values.vllmArgs.servedModelName }}
        - --trust-remote-code
        - --no-enable-log-requests
        - --task
        - score
        env:
        {{- range $key, $value := .Values.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        ports:
        - containerPort: {{ .Values.apiPort }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        - mountPath: {{ .Values.volumes.hfCache.mountPath }}
          name: hf-cache
        - mountPath: /dev/shm
          name: dshm
        startupProbe:
          {{- toYaml .Values.startupProbe | nindent 10 }}
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 10 }}
      # Rerank Proxy (Cohere/Jina → vLLM /classify)
      - name: rerank-proxy
        image: "{{ .Values.proxy.image }}"
        imagePullPolicy: {{ .Values.proxy.imagePullPolicy }}
        command:
          - sh
          - -c
          - |
            pip install --quiet aiohttp && python3 /app/rerank_proxy.py
        ports:
          - containerPort: {{ .Values.proxy.port }}
            protocol: TCP
        resources:
          {{- toYaml .Values.proxy.resources | nindent 10 }}
        volumeMounts:
          - name: proxy-config
            mountPath: /app/rerank_proxy.py
            subPath: rerank_proxy.py
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.proxy.port }}
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 6
      # nginx Dashboard
      - name: nginx
        image: "{{ .Values.nginx.image }}"
        ports:
          - containerPort: {{ .Values.dashboardPort }}
            protocol: TCP
        resources:
          {{- toYaml .Values.nginxResources | nindent 10 }}
        volumeMounts:
          - name: nginx-config
            mountPath: /etc/nginx/conf.d/default.conf
            subPath: nginx.conf
          - name: dashboard-html
            mountPath: /usr/share/nginx/html
      volumes:
      - hostPath:
          path: "{{ .Values.userspace.appData }}/aimrerqwen3vllm/hf-cache"
          type: DirectoryOrCreate
        name: hf-cache
      - emptyDir:
          medium: Memory
          sizeLimit: {{ .Values.volumes.dshm.sizeLimit }}
        name: dshm
      - configMap:
          name: aimrerqwen3vllm-proxy
        name: proxy-config
      - configMap:
          name: aimrerqwen3vllm-dashboard
          items:
          - key: nginx.conf
            path: nginx.conf
        name: nginx-config
      - configMap:
          name: aimrerqwen3vllm-dashboard
        name: dashboard-html
