image:
  repository: ghcr.io/bayerhazard/aimighty-reranker-cpu/reranker
  tag: latest
  pullPolicy: Always
replicaCount: 1
revisionHistoryLimit: 1
apiPort: 30001
dashboardPort: 8080
strategy:
  type: Recreate
resources:
  limits:
    cpu: '4'
    memory: 12Gi
  requests:
    cpu: '1'
    memory: 3Gi
nginx:
  image: nginx:alpine
nginxResources:
  limits:
    cpu: 200m
    memory: 64Mi
  requests:
    cpu: 50m
    memory: 32Mi
env:
  MODEL_NAME: Qwen/Qwen3-Reranker-0.6B
  OV_DEVICE: CPU
  INFERENCE_NUM_THREADS: "8"
  PORT: "30001"
userspace:
  appData: /olares/rootfs/userspace/pvc-userspace-aimighty-phbiddku99qy4cuz
volumes:
  hfCache:
    mountPath: /root/.cache/huggingface
  dshm:
    sizeLimit: 4Gi
startupProbe:
  httpGet:
    path: /health
    port: 30001
  failureThreshold: 90
  periodSeconds: 10
  timeoutSeconds: 30
livenessProbe:
  httpGet:
    path: /health
    port: 30001
  initialDelaySeconds: 120
  periodSeconds: 60
  timeoutSeconds: 15
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /health
    port: 30001
  initialDelaySeconds: 30
  periodSeconds: 20
  timeoutSeconds: 10
  failureThreshold: 3
kubeletCidrs:
  - 172.20.0.0/16
service:
  type: ClusterIP
