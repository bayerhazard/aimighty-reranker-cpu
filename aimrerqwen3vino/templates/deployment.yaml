apiVersion: apps/v1
kind: Deployment
metadata:
  name: aimrerqwen3vino
  namespace: {{ .Release.Namespace }}
  labels:
    app: aimrerqwen3vino
    applications.app.bytetrade.io/name: aimrerqwen3vino
    applications.app.bytetrade.io/owner: aimighty
    applications.app.bytetrade.io/raw-app-name: aimrerqwen3vino
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      app: aimrerqwen3vino
  strategy:
    type: {{ .Values.strategy.type }}
  template:
    metadata:
      labels:
        app: aimrerqwen3vino
        applications.app.bytetrade.io/name: aimrerqwen3vino
        applications.app.bytetrade.io/owner: {{ .Release.Namespace | trimSuffix "-aimighty" }}
        applications.app.bytetrade.io/raw-app-name: aimrerqwen3vino
        io.bytetrade.app: "true"
    spec:
      imagePullSecrets:
      - name: ghcr-pull-secret
      initContainers:
      - name: fix-kubelet-bypass
        image: beclab/init:v1.2.3
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - |
          iptables -t nat -N PROXY_INBOUND 2>/dev/null || true
          for cidr in {{ join " " .Values.kubeletCidrs }}; do
            iptables -t nat -I PROXY_INBOUND 1 -s "$cidr" -j RETURN
          done
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - NET_RAW
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      containers:
      # OpenVINO CPU Inferenz-Server
      - name: aimrerqwen3vino
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        {{- range $key, $value := .Values.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        ports:
        - containerPort: {{ .Values.apiPort }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        - mountPath: {{ .Values.volumes.hfCache.mountPath }}
          name: hf-cache
        - mountPath: /dev/shm
          name: dshm
        - mountPath: /dev/dri
          name: dev-dri
        - mountPath: /dev/accel
          name: dev-accel
        - mountPath: /host_libs
          name: host-libs
        - mountPath: /app/server.py
          name: server-py
          subPath: rerank-server.py
        startupProbe:
          {{- toYaml .Values.startupProbe | nindent 10 }}
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 10 }}
      # nginx Dashboard
      - name: nginx
        image: "{{ .Values.nginx.image }}"
        ports:
        - containerPort: {{ .Values.dashboardPort }}
        resources:
          {{- toYaml .Values.nginxResources | nindent 10 }}
        volumeMounts:
        - mountPath: /etc/nginx/conf.d/default.conf
          name: nginx-config
          subPath: nginx.conf
        - mountPath: /usr/share/nginx/html
          name: dashboard-html
      volumes:
      - hostPath:
          path: "{{ .Values.userspace.appData }}/aimrerqwen3vino/hf-cache"
          type: DirectoryOrCreate
        name: hf-cache
      - emptyDir:
          medium: Memory
          sizeLimit: {{ .Values.volumes.dshm.sizeLimit }}
        name: dshm
      - hostPath:
          path: /dev/dri
        name: dev-dri
      - hostPath:
          path: /dev/accel
        name: dev-accel
      - hostPath:
          path: /usr/lib/x86_64-linux-gnu
        name: host-libs
      - hostPath:
          path: "{{ .Values.userspace.appData }}/Home/Code/aimighty-reranker-cpu"
          type: Directory
        name: server-py
      - configMap:
          name: aimrerqwen3vino-dashboard
          items:
          - key: nginx.conf
            path: nginx.conf
        name: nginx-config
      - configMap:
          name: aimrerqwen3vino-dashboard
        name: dashboard-html
