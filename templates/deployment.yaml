apiVersion: v1
kind: ConfigMap
metadata:
  name: reranker-nginx
  namespace: '{{ .Release.Namespace }}'
data:
  nginx.conf: |
    server {
        listen 8080;
        root /usr/share/nginx/html;
        index index.html;

        # Status UI
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy zur SGLang API (cluster-intern)
        location /health {
            proxy_pass http://localhost:30000/health;
            proxy_set_header Host $host;
        }
        location /v1/ {
            proxy_pass http://localhost:30000/v1/;
            proxy_set_header Host $host;
            proxy_read_timeout 120s;
        }
        location /get_model_info {
            proxy_pass http://localhost:30000/get_model_info;
        }
    }

  index.html: |
    <!DOCTYPE html>
    <html lang="de">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Reranker — Status</title>
      <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          background: #0f1117;
          color: #e2e8f0;
          min-height: 100vh;
          padding: 2rem;
        }
        .container { max-width: 860px; margin: 0 auto; }
        h1 {
          font-size: 1.6rem;
          font-weight: 700;
          margin-bottom: 0.25rem;
          color: #fff;
        }
        .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 2rem; }
        .card {
          background: #1e2330;
          border: 1px solid #2d3748;
          border-radius: 12px;
          padding: 1.5rem;
          margin-bottom: 1.25rem;
        }
        .card h2 {
          font-size: 0.75rem;
          font-weight: 600;
          text-transform: uppercase;
          letter-spacing: 0.08em;
          color: #64748b;
          margin-bottom: 1rem;
        }
        .status-row {
          display: flex;
          align-items: center;
          gap: 1rem;
        }
        .badge {
          display: inline-flex;
          align-items: center;
          gap: 0.4rem;
          padding: 0.35rem 0.85rem;
          border-radius: 999px;
          font-size: 0.85rem;
          font-weight: 600;
        }
        .badge.ok   { background: #14532d; color: #4ade80; }
        .badge.err  { background: #450a0a; color: #f87171; }
        .badge.wait { background: #1e3a5f; color: #60a5fa; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
        .status-detail { color: #94a3b8; font-size: 0.875rem; }
        .info-grid {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 0.75rem;
        }
        .info-item label {
          display: block;
          font-size: 0.75rem;
          color: #64748b;
          margin-bottom: 0.2rem;
        }
        .info-item span {
          font-size: 0.9rem;
          color: #e2e8f0;
          font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .endpoint-block {
          background: #0f1117;
          border: 1px solid #2d3748;
          border-radius: 8px;
          padding: 1rem 1.25rem;
          margin-bottom: 0.75rem;
        }
        .endpoint-block .method {
          display: inline-block;
          background: #7c3aed;
          color: #fff;
          font-size: 0.7rem;
          font-weight: 700;
          padding: 0.15rem 0.5rem;
          border-radius: 4px;
          margin-right: 0.5rem;
          font-family: monospace;
        }
        .endpoint-block .path {
          font-family: monospace;
          color: #a78bfa;
          font-size: 0.9rem;
        }
        .endpoint-block .desc {
          font-size: 0.8rem;
          color: #64748b;
          margin-top: 0.25rem;
        }
        pre {
          background: #0f1117;
          border: 1px solid #2d3748;
          border-radius: 8px;
          padding: 1rem;
          font-size: 0.78rem;
          line-height: 1.6;
          overflow-x: auto;
          color: #86efac;
          font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }
        .tab {
          padding: 0.35rem 0.9rem;
          border-radius: 6px;
          font-size: 0.8rem;
          cursor: pointer;
          border: 1px solid #2d3748;
          background: transparent;
          color: #64748b;
          transition: all 0.15s;
        }
        .tab.active { background: #7c3aed; color: #fff; border-color: #7c3aed; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .refreshed { font-size: 0.75rem; color: #475569; margin-top: 0.5rem; }
        .btn-refresh {
          background: #2d3748;
          border: none;
          color: #94a3b8;
          padding: 0.3rem 0.8rem;
          border-radius: 6px;
          font-size: 0.78rem;
          cursor: pointer;
          margin-left: 0.75rem;
        }
        .btn-refresh:hover { background: #374151; color: #e2e8f0; }
      </style>
    </head>
    <body>
      <div class="container">
        <h1>⚡ Qwen3 Reranker</h1>
        <p class="subtitle">Qwen3-Reranker-0.6B · SGLang · NVIDIA RTX 5090 (Blackwell/cu130)</p>

        <!-- Health -->
        <div class="card">
          <h2>Server Status
            <button class="btn-refresh" onclick="refresh()">↺ Aktualisieren</button>
          </h2>
          <div class="status-row">
            <span id="badge" class="badge wait"><span class="dot"></span>Prüfe…</span>
            <span id="status-detail" class="status-detail"></span>
          </div>
          <p id="refreshed" class="refreshed"></p>
        </div>

        <!-- Model Info -->
        <div class="card">
          <h2>Modell</h2>
          <div class="info-grid" id="model-grid">
            <div class="info-item"><label>Modell</label><span id="m-name">–</span></div>
            <div class="info-item"><label>Max Context</label><span id="m-ctx">–</span></div>
            <div class="info-item"><label>Dtype</label><span>bfloat16</span></div>
            <div class="info-item"><label>Backend</label><span>SGLang · FA4 · cu130</span></div>
          </div>
        </div>

        <!-- Endpoints -->
        <div class="card">
          <h2>Endpunkte</h2>
          <div class="endpoint-block">
            <span class="method">POST</span>
            <span class="path">/v1/rerank</span>
            <div class="desc">Reranking — Jina/Cohere-kompatibel (nicht OpenAI, OpenAI hat keinen Rerank-Endpunkt)</div>
          </div>
          <div class="endpoint-block">
            <span class="method">GET</span>
            <span class="path">/health</span>
            <div class="desc">Health-Check — gibt HTTP 200 zurück wenn bereit</div>
          </div>
          <div class="endpoint-block">
            <span class="method">GET</span>
            <span class="path">/v1/models</span>
            <div class="desc">Listet verfügbare Modelle</div>
          </div>
        </div>

        <!-- Code Examples -->
        <div class="card">
          <h2>Einbindung</h2>
          <div class="tabs">
            <button class="tab active" onclick="showTab('curl')">curl</button>
            <button class="tab" onclick="showTab('python')">Python</button>
            <button class="tab" onclick="showTab('ragflow')">RAGFlow</button>
          </div>

          <div id="tab-curl" class="tab-content active">
            <pre>curl -X POST http://reranker.&lt;namespace&gt;:30000/v1/rerank \
    -H "Content-Type: application/json" \
    -d '{
    "model": "Qwen/Qwen3-Reranker-0.6B",
    "query": "Was ist die Hauptstadt von Deutschland?",
    "documents": [
      "Berlin ist die Hauptstadt Deutschlands.",
      "Paris liegt an der Seine."
    ],
    "instruct": "Given a web search query, retrieve relevant passages that answer the query.",
    "top_n": 2,
    "return_documents": true
    }'</pre>
          </div>

          <div id="tab-python" class="tab-content">
            <pre>import requests

    def rerank(query: str, documents: list[str], top_n: int = 5):
    resp = requests.post(
        "http://reranker.&lt;namespace&gt;:30000/v1/rerank",
        json={
            "model": "Qwen/Qwen3-Reranker-0.6B",
            "query": query,
            "documents": documents,
            "instruct": "Given a web search query, retrieve relevant passages that answer the query.",
            "top_n": top_n,
            "return_documents": True,
        },
        timeout=30,
    )
    resp.raise_for_status()
    return sorted(resp.json(), key=lambda x: x["score"], reverse=True)</pre>
          </div>

          <div id="tab-ragflow" class="tab-content">
            <pre># RAGFlow: Avatar > Model Providers > SGLang > Add Model
    #
    # Model type:  Rerank
    # Model name:  Qwen3-Reranker-0.6B
    # Base URL:    http://reranker.&lt;namespace&gt;:30000
    # API Key:     (leer lassen)
    #
    # Danach unter System Model Settings als
    # Rerank Model auswählen.</pre>
          </div>
        </div>

      </div>

      <script>
        async function refresh() {
          const badge = document.getElementById('badge');
          const detail = document.getElementById('status-detail');
          const ts = document.getElementById('refreshed');
          badge.className = 'badge wait';
          badge.innerHTML = '<span class="dot"></span>Prüfe…';
          detail.textContent = '';

          try {
            const [h, m] = await Promise.all([
              fetch('/health').then(r => ({ ok: r.ok, status: r.status })),
              fetch('/v1/models').then(r => r.ok ? r.json() : null).catch(() => null),
            ]);

            if (h.ok) {
              badge.className = 'badge ok';
              badge.innerHTML = '<span class="dot"></span>Online';
              detail.textContent = 'SGLang antwortet — Modell geladen und bereit';
            } else {
              badge.className = 'badge err';
              badge.innerHTML = '<span class="dot"></span>Fehler';
              detail.textContent = 'HTTP ' + h.status + ' — Server noch nicht bereit?';
            }

            if (m && m.data && m.data.length > 0) {
              const mdl = m.data[0];
              document.getElementById('m-name').textContent = mdl.id || '–';
              document.getElementById('m-ctx').textContent =
                mdl.context_length ? mdl.context_length.toLocaleString() + ' Tokens' : '32 768 Tokens';
            }
          } catch (e) {
            badge.className = 'badge err';
            badge.innerHTML = '<span class="dot"></span>Nicht erreichbar';
            detail.textContent = e.message;
          }

          ts.textContent = 'Zuletzt aktualisiert: ' + new Date().toLocaleTimeString('de-DE');
        }

        function showTab(id) {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
          document.getElementById('tab-' + id).classList.add('active');
          event.target.classList.add('active');
        }

        refresh();
        setInterval(refresh, 30000);
      </script>
    </body>
    </html>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: reranker
    applications.app.bytetrade.io/name: reranker
    applications.app.bytetrade.io/owner: '{{ .Release.Namespace | trimSuffix "-aimighty" }}'
    io.kompose.service: reranker
  name: reranker
  namespace: '{{ .Release.Namespace }}'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reranker
  strategy: {}
  template:
    metadata:
      annotations:
        applications.app.bytetrade.io/studio-expose-ports: ""
      labels:
        app: reranker
        applications.app.bytetrade.io/name: reranker
        applications.app.bytetrade.io/owner: '{{ .Release.Namespace | trimSuffix "-aimighty" }}'
        applications.app.bytetrade.io/raw-app-name: reranker
        io.bytetrade.app: "true"
        io.kompose.network/chrome-default: "true"
        io.kompose.service: reranker
    spec:
      containers:

      # ── SGLang Inference Engine ───────────────────────────────────────────
      - name: sglang
        image: lmsysorg/sglang:latest-cu130
        command:
          - python3
          - -m
          - sglang.launch_server
        args:
          - "--model-path"
          - "Qwen/Qwen3-Reranker-0.6B"
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "30000"
          - "--dtype"
          - "bfloat16"
          # KEIN --kv-cache-dtype fp8 → silent corruption auf SM120 (RTX 5090)
          - "--mem-fraction-static"
          - "0.85"
          # FlashAttention 4 für Blackwell SM120
          - "--prefill-attention-backend"
          - "fa4"
          - "--chunked-prefill-size"
          - "4096"
          - "--max-running-requests"
          - "64"
          - "--disable-radix-cache"
          # KEIN --is-embedding → zerstört yes/no-Logprob-Scoring
          - "--trust-remote-code"
          # Qwen3-Reranker benötigt dieses Chat-Template für korrekte Scores
          - "--chat-template"
          - "examples/chat_template/qwen3_reranker.jinja"
        env:
        - name: HF_HOME
          value: /root/.cache/huggingface
        ports:
        - containerPort: 30000
        resources:
          limits:
            cpu: "8"
            memory: 16Gi
            nvidia.com/gpu: "1"
          requests:
            cpu: "2"
            memory: 4Gi
        volumeMounts:
        - mountPath: /root/.cache/huggingface
          name: hf-cache
        - mountPath: /dev/shm
          name: dshm
        # SGLang braucht 2–5 Min beim ersten Start (JIT + Modell-Download)
        startupProbe:
          httpGet:
            path: /health
            port: 30000
          failureThreshold: 60
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 30000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 30000
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 5

      # ── nginx Status-UI (Browser-Entrance) ────────────────────────────────
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "200m"
            memory: 64Mi
          requests:
            cpu: "50m"
            memory: 32Mi
        volumeMounts:
        - mountPath: /etc/nginx/conf.d/default.conf
          name: nginx-config
          subPath: nginx.conf
        - mountPath: /usr/share/nginx/html/index.html
          name: nginx-config
          subPath: index.html

      restartPolicy: Always
      volumes:
      - hostPath:
          path: '{{ .Values.userspace.appData }}/reranker/hf-cache'
          type: DirectoryOrCreate
        name: hf-cache
      # Ersatz für --ipc=host: großes /dev/shm für PyTorch multiprocessing
      - emptyDir:
          medium: Memory
          sizeLimit: 8Gi
        name: dshm
      - configMap:
          name: reranker-nginx
        name: nginx-config
status: {}

---
# Service: Port 8080 (nginx Status-UI, Olares Entrance)
# Port 30000 (SGLang API, cluster-intern erreichbar)
apiVersion: v1
kind: Service
metadata:
  labels:
    app: reranker
    io.kompose.service: reranker
  name: reranker
  namespace: '{{ .Release.Namespace }}'
spec:
  ports:
  - name: "8080"
    port: 8080
    targetPort: 8080
  - name: "30000"
    port: 30000
    targetPort: 30000
  selector:
    app: reranker
status:
  loadBalancer: {}
