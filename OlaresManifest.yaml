spec:
  versionName: "1.0.1"
  upgradeDescription: |
    v1.0.1: Renamed to 'AIM Qwen3 Reranker CPU'. Fixed icon URL. v1.0.0: Initial stable release. Highly optimized for Intel Core Ultra 9 275HX hybrid architecture (8 threads on Golden Cove/Lion Cove P-cores, avoiding E-core thread synchronization overhead). Unlocked CPU limit to 24 cores. Integrated support for iGPU / NPU hardware routing.
    v0.1.1: Updated ghcr.io image path to repo-scoped for public anonymous pull access.
    v0.1.0: Initial release of OpenVINO CPU-based Qwen3-Reranker-0.6B. Completely offloaded from GPU to Intel Core Ultra 9 275HX.
  fullDescription: |
    Qwen3-Reranker-0.6B + OpenVINO on CPU, optimized for Olares One.

    **Model**
    tomaarsen/Qwen3-Reranker-0.6B-seq-cls — a 600-million-parameter cross-encoder sequence classification model, INT8 quantized via Optimum Intel for efficient CPU inference.

    **Inference Engine**
    OpenVINO 2026.0.0+ with Hugging Face Transformers 4.55.4. Runs on Intel Core Ultra 9 275HX (Meteor Lake) CPU using Redwood/Golden Cove P-Cores.

    **Key Features**
    - Jina/Cohere-compatible API endpoints: /v1/rerank, /rerank, /v1/models, /health
    - Dynamic shapes, async endpoints, and multicore scaling using OpenVINO TBB
    - Automatic model download and OpenVINO conversion on first start
    - Built-in HTML dashboard on root endpoint (/)

    **Resource Usage**
    RAM: 16 GB, CPU: 24 cores
    Disk: 10 GB

