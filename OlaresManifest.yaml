  appData: true
spec:
  versionName: "1.0.4"
  fullDescription: |
    Qwen3-Reranker-0.6B + SGLang on GPU, optimized for Olares One.

    **Model**
    Qwen/Qwen3-Reranker-0.6B — a lightweight 600M-parameter cross-encoder reranker from Qwen, optimized for re-ranking search results in Retrieval-Augmented Generation (RAG) workflows.

    **Inference Engine**
    SGLang with FlashInfer attention backend, optimized for NVIDIA RTX 5090 (Blackwell, SM120). Runs in bfloat16 precision with KV-cache optimization for low-latency inference.

    **Key Features**
    - /v1/rerank endpoint compatible with Cohere and Jina reranking APIs
    - Live monitoring dashboard on port 8080 with real-time request metrics
    - Prometheus metrics exposed via /metrics for observability
    - nginx reverse proxy for dashboard access

    **Resource Usage**
    GPU: 4 GB VRAM (NVIDIA RTX 5090 or compatible)
    RAM: 12 GB
    Disk: 10 GB
  developer: Aimighty
  locale:
  - en
  supportArch:
  - amd64
  requiredCpu: 1
  requiredMemory: 4Gi
  requiredDisk: 10Gi
  requiredGpu: 1
  limitedCpu: 4
  limitedMemory: 12Gi
options:
