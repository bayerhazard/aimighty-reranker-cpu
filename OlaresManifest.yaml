  appid: aimrerqwen3sglang
  title: AIM Qwen3 Rer 0.6B SGLang
  description: Qwen3-Reranker-0.6B via SGLang — RAG-ready /v1/rerank endpoint with FlashInfer backend and live monitoring dashboard
