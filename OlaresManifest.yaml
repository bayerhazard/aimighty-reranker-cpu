spec:
  developer: "Qwen Team / SGLang Project"
  fullDescription: |
    Deploys Qwen3-Reranker-0.6B using SGLang (lmsysorg/sglang:latest-cu130).
    Optimized for NVIDIA Blackwell (RTX 5090, SM120, CUDA 13.0).

    Browser UI (Port 8080): Status page with live health check and API usage examples.
    Internal API (Port 30000): OpenAI-compatible /v1/rerank endpoint.

    RAGFlow: Model Providers > SGLang > Base URL: http://reranker.<namespace>:30000
    LangChain/LlamaIndex: POST http://reranker.<namespace>:30000/v1/rerank

    Security: Only load models from the official Qwen/ HuggingFace account.
    CVE-2026-5760 affects the /v1/rerank path with malicious GGUF models.
