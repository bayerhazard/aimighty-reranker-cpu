olaresManifest.version: 0.11.0
olaresManifest.type: app
metadata:
  name: reranker
  appid: reranker
  title: Aimighty Reranker
  description: Qwen3-Reranker-0.6B via SGLang on NVIDIA RTX 5090 (Blackwell). RAG-ready /v1/rerank endpoint with live monitoring dashboard.
  icon: https://github.com/bayerhazard/aimighty-reranker/raw/main/icon.png
  version: 1.0.0
  categories:
  - AI
  - Developer Tools
entrances:
- name: reranker
  port: 8080
  title: Reranker
  host: reranker
  authLevel: internal
  invisible: false
permission:
  appData: true
spec:
  versionName: "1.0.0"
  fullDescription: |
    Aimighty Reranker deploys Qwen3-Reranker-0.6B using SGLang on NVIDIA RTX 5090 (Blackwell).

    Features:
    - /v1/rerank endpoint (Cohere/Jina-compatible)
    - Live monitoring dashboard on port 8080
    - FlashInfer attention backend optimized for SM120
    - Prometheus metrics via /metrics
    - Optimized: 4 GB GPU, 12 GB RAM

    RAGFlow Integration:
    Base URL: http://reranker.<namespace>:30000
    Model: Qwen/Qwen3-Reranker-0.6B

    Architecture:
    - SGLang inference engine with FlashInfer backend
    - nginx reverse proxy for dashboard
    - bfloat16 precision, KV-cache optimized
  developer: Aimighty
  locale:
  - en
  supportArch:
  - amd64
  requiredCpu: 1
  requiredMemory: 4Gi
  requiredDisk: 10Gi
  requiredGpu: 1
  limitedCpu: 4
  limitedMemory: 12Gi
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.2-0'
  allowMultipleInstall: false
